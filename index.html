<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Soccer Champs">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#2e7d32">
    
    <title>Soccer Champs - Full Match Edition</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #111;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; width: 100vw; overflow: hidden;
            touch-action: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none; user-select: none;
        }
        #gameContainer {
            display: flex; align-items: center; justify-content: center;
            width: 100%; height: 100%;
        }
        canvas {
            display: block; background-color: #388e3c;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="gameContainer">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
    </div>

<script>
// ==========================================
// CORE SETUP & SCALING
// ==========================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let scaleX = 1, scaleY = 1, rect;

function resizeCanvas() {
    const targetRatio = 900 / 550;
    const windowRatio = window.innerWidth / window.innerHeight;
    let newWidth, newHeight;
    
    if (windowRatio > targetRatio) {
        newHeight = window.innerHeight; newWidth = newHeight * targetRatio;
    } else {
        newWidth = window.innerWidth; newHeight = newWidth / targetRatio;
    }
    
    canvas.style.width = `${newWidth}px`; canvas.style.height = `${newHeight}px`;
    rect = canvas.getBoundingClientRect();
    scaleX = canvas.width / rect.width; scaleY = canvas.height / rect.height;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ==========================================
// GAME VARIABLES
// ==========================================
const STATES = { MENU: 'MENU', PLAYING: 'PLAYING', GOAL: 'GOAL', MISSED: 'MISSED', GAMEOVER: 'GAMEOVER' };
let currentState = STATES.MENU;
let playerScore = 0, cpuScore = 0, currentChance = 1, totalChances = 5, stateTimer = 0, feedbackMessage = "";

const GOAL_TOP = 175, GOAL_BOTTOM = 375, FIELD_RIGHT = 850, FIELD_LEFT = 50;
let touches = {};
let joystick = { active: false, id: null, originX: 0, originY: 0, dx: 0, dy: 0 };
let swipe = { active: false, id: null, points: [] };

let ball, players, defenders, playerGK, cpuGK;
let activePlayer = null; // Blue player controlled by user
let activeCpuPlayer = null; // Red player holding ball
let teamInPossession = 'PLAYER'; // 'PLAYER' or 'CPU'
let tackleCooldown = 0;

// ==========================================
// GRAPHICS RENDERER (TOP-DOWN PLAYERS)
// ==========================================
function drawCharacter(ctx, x, y, angle, radius, color, isHighlight, isCpuActive) {
    ctx.save();
    ctx.translate(x, y);
    
    // Player indicator rings
    if (isHighlight) {
        ctx.beginPath(); ctx.arc(0, 0, radius + 10, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; ctx.lineWidth = 2; ctx.stroke();
    } else if (isCpuActive) {
        ctx.beginPath(); ctx.arc(0, 0, radius + 10, 0, Math.PI * 2);
        ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)'; ctx.lineWidth = 2; ctx.stroke();
    }

    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.arc(4, 5, radius, 0, Math.PI*2); ctx.fill();

    ctx.rotate(angle);
    ctx.fillStyle = '#111';
    ctx.beginPath(); ctx.arc(radius * 0.4, -radius * 0.65, radius * 0.35, 0, Math.PI*2); ctx.fill(); 
    ctx.beginPath(); ctx.arc(radius * 0.4, radius * 0.65, radius * 0.35, 0, Math.PI*2); ctx.fill(); 

    ctx.fillStyle = color;
    ctx.beginPath(); ctx.ellipse(0, 0, radius * 0.85, radius * 1.15, 0, 0, Math.PI * 2); ctx.fill();
    ctx.lineWidth = 1.5; ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.stroke();

    ctx.fillStyle = '#ffccaa';
    ctx.beginPath(); ctx.arc(radius * 0.2, 0, radius * 0.55, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    
    ctx.fillStyle = '#3e2723';
    ctx.beginPath(); ctx.arc(radius * 0.15, 0, radius * 0.55, -Math.PI * 0.65, Math.PI * 0.65, true); ctx.fill();

    ctx.restore();
}

// ==========================================
// ENTITY CLASSES
// ==========================================
class Ball {
    constructor() { this.reset(); }
    reset() {
        this.x = 200; this.y = 275; this.vx = 0; this.vy = 0; this.radius = 8;
        this.isPassing = false; this.targetPlayer = null; 
        this.isCurving = false; this.isShooting = false;
        this.curveT = 0; this.curveSpeed = 0.015;
        this.p0 = null; this.p1 = null; this.p2 = null; this.trail = [];
    }
    shootCurve(p0, p1, p2) {
        this.p0 = p0; this.p1 = p1; this.p2 = p2;
        this.isCurving = true; this.curveT = 0; this.trail = [];
        let dist = Math.hypot(p2.x - p0.x, p2.y - p0.y);
        this.curveSpeed = 12 / dist; 
    }
    checkGoalOrBounds() {
        if (this.x >= FIELD_RIGHT - 10) {
            if (this.y > GOAL_TOP && this.y < GOAL_BOTTOM) { playerScore++; triggerChanceEnd("GOAL!!!"); } 
            else triggerChanceEnd("MISSED WIDE!");
            return true;
        } else if (this.x <= FIELD_LEFT + 10) {
            if (this.y > GOAL_TOP && this.y < GOAL_BOTTOM) { cpuScore++; triggerChanceEnd("CPU SCORED!!!"); } 
            else triggerChanceEnd("CPU MISSED!");
            return true;
        } else if (this.curveT >= 1 || this.y < 0 || this.y > 550) {
            triggerChanceEnd("OUT OF BOUNDS!"); return true;
        }
        return false;
    }
    update() {
        let isTraveling = this.isPassing || this.isCurving || this.isShooting;
        
        // Mid-air Interceptions
        if (isTraveling && tackleCooldown <= 0) {
            let opponents = teamInPossession === 'PLAYER' ? defenders : players;
            for (let opp of opponents) {
                if (Math.hypot(this.x - opp.x, this.y - opp.y) < opp.radius + this.radius + 6) {
                    this.isPassing = false; this.isCurving = false; this.isShooting = false;
                    teamInPossession = teamInPossession === 'PLAYER' ? 'CPU' : 'PLAYER';
                    if (teamInPossession === 'CPU') activeCpuPlayer = opp;
                    else { activePlayer = opp; activeCpuPlayer = null; }
                    tackleCooldown = 45;
                    return;
                }
            }
        }

        if (this.isPassing && this.targetPlayer) {
            let tx = this.targetPlayer.x, ty = this.targetPlayer.y;
            if (Math.hypot(tx - this.x, ty - this.y) < this.radius + this.targetPlayer.radius + 5) {
                this.isPassing = false; activePlayer = this.targetPlayer; this.targetPlayer = null;
            } else {
                let angle = Math.atan2(ty - this.y, tx - this.x);
                this.x += Math.cos(angle) * 11; this.y += Math.sin(angle) * 11;
            }
        } else if (this.isCurving) {
            this.curveT += this.curveSpeed; if(this.curveT > 1) this.curveT = 1;
            let mt = 1 - this.curveT;
            this.x = (mt * mt * this.p0.x) + (2 * mt * this.curveT * this.p1.x) + (this.curveT * this.curveT * this.p2.x);
            this.y = (mt * mt * this.p0.y) + (2 * mt * this.curveT * this.p1.y) + (this.curveT * this.curveT * this.p2.y);
            this.trail.push({x: this.x, y: this.y}); if(this.trail.length > 15) this.trail.shift();
            this.checkGoalOrBounds();
        } else if (this.isShooting) {
            this.x += this.vx; this.y += this.vy;
            this.checkGoalOrBounds();
        }
    }
    draw() {
        if (this.isCurving && this.trail.length > 1) {
            ctx.beginPath(); ctx.moveTo(this.trail[0].x, this.trail[0].y);
            for(let i=1; i<this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)'; ctx.lineWidth = 4; ctx.stroke();
        }
        ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(this.x + 3, this.y + 4, this.radius, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#fff'; ctx.fill(); ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.stroke();
    }
}

class Player {
    constructor(id, x, y) {
        this.id = id; this.startX = x; this.startY = y;
        this.x = x; this.y = y; this.radius = 16; this.angle = 0; 
    }
    reset() { this.x = this.startX; this.y = this.startY; this.angle = 0; }
    update() {
        if (activePlayer === this) {
            // Joystick always controls active player (Attacking AND Defending)
            if (joystick.active) {
                let dist = Math.hypot(joystick.dx, joystick.dy);
                if (dist > 0) {
                    let speed = Math.min(dist / 20, 2.9);
                    this.x += (joystick.dx / dist) * speed;
                    this.y += (joystick.dy / dist) * speed;
                    this.angle = Math.atan2(joystick.dy, joystick.dx); 
                }
            } else if (teamInPossession === 'PLAYER') {
                this.x += 0.8; this.angle = 0; // auto dribble right
            }

            // Field Bounds
            if (this.x > FIELD_RIGHT - 50) this.x = FIELD_RIGHT - 50;
            if (this.x < FIELD_LEFT + 50) this.x = FIELD_LEFT + 50;
            if (this.y < 20) this.y = 20;
            if (this.y > 530) this.y = 530;
            
            // Hold ball if attacking
            if (teamInPossession === 'PLAYER' && !ball.isPassing && !ball.isCurving && !ball.isShooting) {
                ball.x = this.x + Math.cos(this.angle) * 16;
                ball.y = this.y + Math.sin(this.angle) * 16;
            }
        } else {
             if (teamInPossession === 'PLAYER') {
                 // Attacking Runs
                 if (this.x < 680) this.x += 1.2; 
                 let laneDiff = this.startY - this.y;
                 if (Math.abs(laneDiff) > 5) this.y += Math.sign(laneDiff) * 0.5;
                 this.angle = Math.atan2(ball.y - this.y, ball.x - this.x);
             } else {
                 // Defending: AI Teammates drop back and mark
                 let targetX = ball.x - 60; // Stay goal side
                 if (this.x > targetX) this.x -= 1.4;
                 else if (Math.hypot(ball.x - this.x, ball.y - this.y) < 120) {
                     let a = Math.atan2(ball.y - this.y, ball.x - this.x);
                     this.x += Math.cos(a) * 1.3; this.y += Math.sin(a) * 1.3;
                 }
                 this.angle = Math.atan2(ball.y - this.y, ball.x - this.x);
             }
        }
    }
    draw() {
        let isHighlight = activePlayer === this;
        let color = isHighlight ? '#29b6f6' : '#0288d1'; 
        drawCharacter(ctx, this.x, this.y, this.angle, this.radius, color, isHighlight, false);
    }
}

class Defender {
    constructor(x, y, speed) {
        this.startX = x; this.startY = y; this.x = x; this.y = y;
        this.radius = 16; this.speed = speed; this.angle = Math.PI;
    }
    reset() { this.x = this.startX; this.y = this.startY; }
    update() {
        if (teamInPossession === 'CPU') {
            if (activeCpuPlayer === this && !ball.isShooting) {
                // CPU Attacking: Dribble Left towards Player Goal
                this.x -= 1.4; this.angle = Math.PI;
                if (this.x < FIELD_LEFT + 50) this.x = FIELD_LEFT + 50;
                
                ball.x = this.x + Math.cos(this.angle) * 16;
                ball.y = this.y + Math.sin(this.angle) * 16;

                // CPU Shooting Logic
                if (this.x < 280 && Math.random() < 0.02) {
                    let targetY = GOAL_TOP + 10 + Math.random() * (GOAL_BOTTOM - GOAL_TOP - 20);
                    let a = Math.atan2(targetY - this.y, FIELD_LEFT - this.x);
                    ball.vx = Math.cos(a) * 13; ball.vy = Math.sin(a) * 13;
                    ball.isShooting = true; activeCpuPlayer = null;
                }
            } else {
                // CPU Teammates make forward runs
                if (this.x > 200) this.x -= 1.2;
                this.angle = Math.atan2(ball.y - this.y, ball.x - this.x);
            }
        } else {
            // CPU Defending (Zonal Pressing)
            let myDist = Math.hypot(ball.x - this.x, ball.y - this.y);
            let isPresser = true;
            defenders.forEach(d => { if (d !== this && Math.hypot(ball.x - d.x, ball.y - d.y) < myDist) isPresser = false; });

            if (isPresser || myDist < 90) {
                let target = ball.isPassing ? ball : (activePlayer || ball);
                this.angle = Math.atan2(target.y - this.y, target.x - this.x);
                this.x += Math.cos(this.angle) * this.speed; this.y += Math.sin(this.angle) * this.speed;
            } else {
                let nearest = null, minDist = Infinity;
                players.forEach(p => {
                    if (p !== activePlayer) {
                        let d = Math.hypot(p.x - this.x, p.y - this.y);
                        if (d < minDist) { minDist = d; nearest = p; }
                    }
                });
                if (nearest) {
                    let markX = nearest.x + 50, markY = nearest.y;
                    this.angle = Math.atan2(markY - this.y, markX - this.x);
                    if (Math.hypot(markX - this.x, markY - this.y) > 15) {
                        this.x += Math.cos(this.angle) * (this.speed * 0.85);
                        this.y += Math.sin(this.angle) * (this.speed * 0.85);
                    } else this.angle = Math.atan2(ball.y - this.y, ball.x - this.x);
                }
            }
        }
    }
    draw() {
        drawCharacter(ctx, this.x, this.y, this.angle, this.radius, '#e53935', false, activeCpuPlayer === this);
    }
}

class Goalkeeper {
    constructor(side, color) {
        this.side = side; this.color = color;
        this.startX = side === 'LEFT' ? FIELD_LEFT + 15 : FIELD_RIGHT - 15;
        this.x = this.startX; this.y = 275; this.radius = 16; this.speed = 1.6;
        this.angle = side === 'LEFT' ? 0 : Math.PI;
    }
    reset() { this.x = this.startX; this.y = 275; this.speed = 1.6; }
    update() {
        this.angle = Math.atan2(ball.y - this.y, ball.x - this.x);
        let isThreat = (this.side === 'RIGHT' && ball.x > 450) || (this.side === 'LEFT' && ball.x < 450);
        
        if (isThreat) {
            let isShot = ball.isCurving || ball.isShooting;
            let targetY = ball.y;
            
            // Reaction speed logic
            let reactSpeed = isShot ? 3.8 : 1.6;
            let diffY = targetY - this.y;
            if (Math.abs(diffY) > 2) this.y += Math.sign(diffY) * Math.min(Math.abs(diffY), reactSpeed);
        }
        
        // Clamp to goal line
        if (this.y < GOAL_TOP + 10) this.y = GOAL_TOP + 10;
        if (this.y > GOAL_BOTTOM - 10) this.y = GOAL_BOTTOM - 10;

        // Save Collision
        if (Math.hypot(ball.x - this.x, ball.y - this.y) < this.radius + ball.radius + 5) {
            triggerChanceEnd(this.side === 'LEFT' ? "WHAT A SAVE!" : "KEEPER SAVES IT!");
        }
    }
    draw() { drawCharacter(ctx, this.x, this.y, this.angle, this.radius, this.color, false, false); }
}

// ==========================================
// GAME LOGIC & CONTROLS
// ==========================================
function initGame() {
    ball = new Ball();
    players = [new Player(1, 250, 275), new Player(2, 200, 120), new Player(3, 200, 430)];
    defenders = [new Defender(550, 150, 1.35), new Defender(500, 275, 1.5), new Defender(550, 400, 1.35)];
    cpuGK = new Goalkeeper('RIGHT', '#ffb300');
    playerGK = new Goalkeeper('LEFT', '#66bb6a');
    activePlayer = players[0]; teamInPossession = 'PLAYER';
}

function startChance() {
    ball.reset(); players.forEach(p => p.reset()); defenders.forEach(d => d.reset()); 
    cpuGK.reset(); playerGK.reset();
    activePlayer = players[0]; activeCpuPlayer = null; teamInPossession = 'PLAYER';
    currentState = STATES.PLAYING; joystick.active = false; swipe.active = false; touches = {}; tackleCooldown = 0;
}

function triggerChanceEnd(msg) {
    feedbackMessage = msg; currentState = STATES.MISSED; stateTimer = 90;
    joystick.active = false; swipe.active = false;
}

function advanceGameFlow() {
    if (currentChance < totalChances) { currentChance++; startChance(); } 
    else { currentState = STATES.GAMEOVER; }
}

// Global update logic handling Tackles & Collisions
function globalInteractions() {
    if (tackleCooldown > 0) tackleCooldown--;
    
    // Live possession stealing via player collision
    if (!ball.isPassing && !ball.isCurving && !ball.isShooting && tackleCooldown <= 0) {
        if (teamInPossession === 'PLAYER') {
            for (let d of defenders) {
                if (Math.hypot(ball.x - d.x, ball.y - d.y) < d.radius + ball.radius + 5) {
                    teamInPossession = 'CPU'; activeCpuPlayer = d; tackleCooldown = 45;
                    // Auto switch user to closest defender
                    let closest = players[0], md = Infinity;
                    players.forEach(p => { let dist = Math.hypot(d.x - p.x, d.y - p.y); if(dist < md) { md = dist; closest = p; } });
                    activePlayer = closest; return;
                }
            }
        } else {
            for (let p of players) {
                if (Math.hypot(ball.x - p.x, ball.y - p.y) < p.radius + ball.radius + 5) {
                    teamInPossession = 'PLAYER'; activePlayer = p; activeCpuPlayer = null; tackleCooldown = 45; return;
                }
            }
        }
    }
}

// Touch Handlers
canvas.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (currentState === STATES.MENU || currentState === STATES.GAMEOVER) {
        if(currentState === STATES.GAMEOVER) { currentState = STATES.MENU; return; }
        playerScore = 0; cpuScore = 0; currentChance = 1; startChance(); return;
    }
    if (currentState !== STATES.PLAYING) return;

    let px = (e.clientX - rect.left) * scaleX;
    let py = (e.clientY - rect.top) * scaleY;
    touches[e.pointerId] = { startX: px, startY: py, x: px, y: py };

    // Manual Player Switching or Passing
    let clickedTeammate = null;
    players.forEach(p => { if (p !== activePlayer && Math.hypot(px - p.x, py - p.y) < 50) clickedTeammate = p; });

    if (clickedTeammate) {
        if (teamInPossession === 'PLAYER' && !ball.isPassing && !ball.isCurving) {
            ball.targetPlayer = clickedTeammate; ball.isPassing = true; joystick.active = false;
        } else if (teamInPossession === 'CPU') {
            activePlayer = clickedTeammate; // Manual switch on defense
        }
        return;
    }

    if (px < 450) {
        joystick.active = true; joystick.id = e.pointerId;
        joystick.originX = px; joystick.originY = py; joystick.dx = 0; joystick.dy = 0;
    } else if (teamInPossession === 'PLAYER') {
        swipe.active = true; swipe.id = e.pointerId; swipe.points = [{x: px, y: py}];
    }
});

canvas.addEventListener('pointermove', (e) => {
    e.preventDefault();
    if (!touches[e.pointerId]) return;
    let px = (e.clientX - rect.left) * scaleX;
    let py = (e.clientY - rect.top) * scaleY;
    touches[e.pointerId].x = px; touches[e.pointerId].y = py;

    if (joystick.active && e.pointerId === joystick.id) {
        let dx = px - joystick.originX, dy = py - joystick.originY, dist = Math.hypot(dx, dy);
        if (dist > 50) { dx = (dx / dist) * 50; dy = (dy / dist) * 50; }
        joystick.dx = dx; joystick.dy = dy;
    }
    if (swipe.active && e.pointerId === swipe.id) swipe.points.push({x: px, y: py});
});

function handleTouchEnd(e) {
    if (!touches[e.pointerId]) return;
    if (joystick.active && e.pointerId === joystick.id) joystick.active = false;
    
    if (swipe.active && e.pointerId === swipe.id) {
        swipe.active = false;
        if (teamInPossession === 'PLAYER' && swipe.points.length > 3) {
            let first = swipe.points[0], last = swipe.points[swipe.points.length - 1];
            let dx = last.x - first.x, dy = last.y - first.y;
            
            if (dx > 20 || Math.hypot(dx, dy) > 40) {
                let dist = Math.hypot(dx, dy);
                let dirX = dx / dist, dirY = dy / dist;
                let pStart = {x: ball.x, y: ball.y};
                let distToGoal = (FIELD_RIGHT + 20 - pStart.x) / (dirX === 0 ? 0.01 : dirX);
                if (distToGoal < 0 || distToGoal > 1000) distToGoal = 500;
                let pEnd = { x: pStart.x + dirX * distToGoal, y: pStart.y + dirY * distToGoal };
                
                let midPoint = swipe.points[Math.floor(swipe.points.length / 2)];
                let straightMid = { x: (first.x + last.x)/2, y: (first.y + last.y)/2 };
                let stretch = distToGoal / dist; 
                let pCtrl = { 
                    x: ((pStart.x + pEnd.x)/2) + ((midPoint.x - straightMid.x) * stretch), 
                    y: ((pStart.y + pEnd.y)/2) + ((midPoint.y - straightMid.y) * stretch) 
                };

                ball.shootCurve(pStart, pCtrl, pEnd);
                joystick.active = false; 
            }
        }
    }
    delete touches[e.pointerId];
}
canvas.addEventListener('pointerup', handleTouchEnd);
canvas.addEventListener('pointercancel', handleTouchEnd);
canvas.addEventListener('pointerout', handleTouchEnd);

// ==========================================
// RENDER ENGINE
// ==========================================
function drawPitch() {
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 3;
    ctx.strokeRect(50, 30, 800, 490);
    ctx.beginPath(); ctx.moveTo(450, 30); ctx.lineTo(450, 520); ctx.stroke();
    ctx.beginPath(); ctx.arc(450, 275, 70, 0, Math.PI * 2); ctx.stroke();
    
    // Right Penalty Area
    ctx.strokeRect(700, 115, 150, 320); ctx.strokeRect(800, 195, 50, 160);
    // Left Penalty Area
    ctx.strokeRect(50, 115, 150, 320); ctx.strokeRect(50, 195, 50, 160);

    ctx.fillStyle = '#fff';
    // Right Goal
    ctx.fillRect(FIELD_RIGHT, GOAL_TOP, 8, 6); ctx.fillRect(FIELD_RIGHT, GOAL_BOTTOM - 6, 8, 6);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)'; ctx.fillRect(FIELD_RIGHT, GOAL_TOP, 15, GOAL_BOTTOM - GOAL_TOP);
    
    // Left Goal
    ctx.fillStyle = '#fff';
    ctx.fillRect(42, GOAL_TOP, 8, 6); ctx.fillRect(42, GOAL_BOTTOM - 6, 8, 6);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)'; ctx.fillRect(35, GOAL_TOP, 15, GOAL_BOTTOM - GOAL_TOP);
}

function drawHUD() {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)'; ctx.fillRect(0, 0, 900, 50);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(`MATCH CHANCE: ${currentChance}/${totalChances}`, 20, 33);
    
    // Possession Indicator
    ctx.textAlign = 'center';
    ctx.fillStyle = teamInPossession === 'PLAYER' ? '#29b6f6' : '#e53935';
    ctx.fillText(teamInPossession === 'PLAYER' ? '▶ ATTACKING' : '◀ DEFENDING', 450, 33);

    ctx.textAlign = 'right'; ctx.fillStyle = '#fff';
    ctx.fillText(`YOU: ${playerScore}  |  CPU: ${cpuScore}`, 880, 33);
    
    if (joystick.active) {
        ctx.beginPath(); ctx.arc(joystick.originX, joystick.originY, 50, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.1)'; ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth=2; ctx.stroke();
        
        ctx.beginPath(); ctx.arc(joystick.originX + joystick.dx, joystick.originY + joystick.dy, 20, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.fill();
    }
    
    if (swipe.active && swipe.points.length > 1) {
        ctx.beginPath(); ctx.moveTo(swipe.points[0].x, swipe.points[0].y);
        for(let i=1; i<swipe.points.length; i++) ctx.lineTo(swipe.points[i].x, swipe.points[i].y);
        ctx.strokeStyle = 'rgba(255, 193, 7, 0.8)'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.stroke();
    }
}

function update() {
    if (currentState === STATES.PLAYING) {
        globalInteractions(); // Handle Tackles
        ball.update(); players.forEach(p => p.update()); defenders.forEach(d => d.update()); 
        cpuGK.update(); playerGK.update();
        if (ball.x > 950 || ball.x < -50 || ball.y > 600 || ball.y < -50) triggerChanceEnd("OUT OF BOUNDS!");
    } else if (currentState === STATES.GOAL || currentState === STATES.MISSED) {
        stateTimer--; if (stateTimer <= 0) advanceGameFlow();
    }
}

function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#2e7d32'; ctx.fillRect(0,0,900,550);
    ctx.fillStyle = '#388e3c'; for(let i=50; i<850; i+=100) ctx.fillRect(i, 30, 50, 490);
    
    drawPitch();
    players.forEach(p => p.draw()); defenders.forEach(d => d.draw());
    cpuGK.draw(); playerGK.draw(); ball.draw(); drawHUD();

    if (currentState === STATES.MENU) {
        ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0, 0, 900, 550);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
        ctx.font = 'bold 54px sans-serif'; ctx.fillText("SOCCER CHAMPS", 450, 140);
        
        ctx.font = '18px sans-serif'; ctx.fillStyle = '#ddd';
        ctx.fillText("Controls:", 450, 220);
        ctx.fillText("👈 DRAG left side to MOVE & TACKLE", 450, 255);
        ctx.fillText("👉 SWIPE right side to CURVE SHOT", 450, 290);
        ctx.fillText("👇 TAP teammate to PASS or SWITCH PLAYER", 450, 325);
        
        ctx.fillStyle = '#ff9800'; ctx.font = 'bold 20px sans-serif';
        ctx.fillText("NEW: The CPU will counter-attack if you lose the ball!", 450, 380);

        ctx.fillStyle = '#29b6f6'; ctx.font = 'bold 26px sans-serif'; ctx.fillText("TAP ANYWHERE TO KICK OFF", 450, 450);
    }
    if (currentState === STATES.GOAL || currentState === STATES.MISSED) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 200, 900, 150);
        ctx.fillStyle = (feedbackMessage.includes("GOAL") && !feedbackMessage.includes("CPU")) ? '#4caf50' : '#ff9800';
        ctx.textAlign = 'center'; ctx.font = 'bold 50px sans-serif'; ctx.fillText(feedbackMessage, 450, 290);
    }
    if (currentState === STATES.GAMEOVER) {
        ctx.fillStyle = 'rgba(0,0,0,0.9)'; ctx.fillRect(0, 0, 900, 550);
        ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
        ctx.font = 'bold 54px sans-serif'; ctx.fillText("FULL TIME", 450, 180);
        ctx.font = 'bold 36px sans-serif'; ctx.fillText(`FINAL SCORE: YOU ${playerScore} - ${cpuScore} CPU`, 450, 270);
        ctx.font = 'bold 42px sans-serif';
        if(playerScore > cpuScore) { ctx.fillStyle = '#4caf50'; ctx.fillText("YOU WIN THE MATCH!", 450, 360); }
        else if(playerScore === cpuScore) { ctx.fillStyle = '#ffb300'; ctx.fillText("IT'S A DRAW!", 450, 360); }
        else { ctx.fillStyle = '#f44336'; ctx.fillText("YOU LOST!", 450, 360); }
        ctx.fillStyle = '#aaa'; ctx.font = '20px sans-serif'; ctx.fillText("Tap anywhere to play again", 450, 450);
    }
}
function gameLoop() { update(); render(); requestAnimationFrame(gameLoop); }
initGame(); gameLoop();
</script>
</body>
</html>
